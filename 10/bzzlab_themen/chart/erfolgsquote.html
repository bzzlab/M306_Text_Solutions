<!doctype html>
<html>
  <head>
    <script src="https://cdn.anychart.com/js/7.12.0/anychart-bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.anychart.com/css/7.12.0/anychart-ui.min.css" />
    <style>
      html, body, #container {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <script>

anychart.onDocumentReady(function() {
  // create pie chart with passed data
  chart = anychart.pie([
      ['Erfolgreicher Projekte',16],
      ['abgebrochene Projekte',31],
      ['Teilerfolgreiche Projekte',53],
  ]);

  // set container id for the chart
  chart.container('container');

  // set chart title text settings
  chart.title('Erfolgsquote bei Projekten');
  
  //set chart radius
  chart.radius('43%');

  // create empty area in pie chart
  chart.innerRadius('30%');

  //disable chart legend
    chart.legend(false);

  // initiate chart drawing
  chart.draw();
});
    </script>
  </body>
</html>
